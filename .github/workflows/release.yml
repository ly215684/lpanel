name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install frontend dependencies
        working-directory: web
        run: npm install

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Install backend dependencies
        working-directory: server
        run: npm install

      - name: Build backend
        working-directory: server
        run: npm run build

      - name: Generate Prisma client
        working-directory: server
        run: npx prisma generate

      - name: Copy frontend build to backend
        run: cp -r web/dist server/public

      - name: Create release directory
        run: mkdir -p release/lpanel

      - name: Copy server files to release
        run: cp -r server/* release/lpanel/

      - name: Copy scripts to release
        run: cp -r scripts release/lpanel/

      - name: Copy install.sh to release
        run: cp install.sh release/lpanel/

      - name: Copy README to release
        run: cp README.md release/lpanel/

      - name: Create zip archive
        run: cd release && zip -r lpanel-${{ github.ref_name }}.zip lpanel

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: LPanel ${{ github.ref_name }}
          body: |
            LPanel - Linux Server Management Panel

            **Changes:**
            - Automated build from ${{ github.sha }}

            **Installation:**
            ```bash
            unzip lpanel-${{ github.ref_name }}.zip
            cd lpanel
            sudo bash install.sh
            ```
          artifacts: "release/lpanel-${{ github.ref_name }}.zip"
          token: ${{ secrets.GITHUB_TOKEN }}