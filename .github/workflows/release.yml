name: Release Build

on:
  push:
    tags:
      - 'v*'
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Install backend dependencies
        working-directory: server
        run: npm ci

      - name: Build backend
        working-directory: server
        run: npm run build

      - name: Generate Prisma client
        working-directory: server
        run: npx prisma generate

      - name: Copy frontend build to backend
        run: cp -r web/dist server/public

      - name: Create release directory
        run: mkdir -p release/lpanel

      - name: Copy server files to release
        run: cp -r server/* release/lpanel/

      - name: Copy scripts to release
        run: cp -r scripts release/lpanel/

      - name: Copy README to release
        run: cp README.md release/lpanel/

      - name: Create zip archive
        run: cd release && zip -r lpanel-${{ github.ref_name }}.zip lpanel

      - name: Get release version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: LPanel ${{ github.ref_name }}
          body: |
            LPanel - Linux Server Management Panel

            **Changes:**
            - Automated build from ${{ github.sha }}

            **Installation:**
            ```bash
            unzip lpanel-${{ github.ref_name }}.zip
            cd lpanel
            sudo bash scripts/install.sh
            ```
          draft: false
          prerelease: false

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: release/lpanel-${{ github.ref_name }}.zip
          asset_name: lpanel-${{ github.ref_name }}.zip
          asset_content_type: application/zip